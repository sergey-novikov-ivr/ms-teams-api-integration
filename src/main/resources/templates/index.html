<html>	
	<head>
		<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
		<title>MS Teams Integration Demo</title>		
		<link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">		
		<script th:src="@{/js/jquery-3.5.1.min.js}"></script>
		<script th:src="@{/js/bootstrap.min.js}"></script>
		<script th:src="@{/js/dataTables.editor.min.js}"></script>
		
	</head>
	
	<body>

		<nav class="navbar navbar-default navbar-fixed-top">
			<div class="container">
				<div class="navbar-header">
					<a class="navbar-brand" href="/">MS Teams Integration Demo</a>
				</div>
			</div>
		</nav>

		<br/>

		<div class="container">			

			<div class="card">
				<div class="card-header">
					<h5>Create new meeting</h5>
				</div>
				<div class="card-body">
					
					<form action="#" th:action="@{/}" th:object="${meetings}" method="post" class="row g-3">					
						<div class="col-md-6">
							<label for="startDate" class="form-label">Start date</label>
							<input type="datetime-local" class="form-control" th:field="*{startDateTime}">
						</div>
						<div class="col-md-6">
							<label for="endDate" class="form-label">End date</label>
							<input type="datetime-local" class="form-control" th:field="*{endDateTime}">
						</div>
						<div class="col-md-6">
							<label for="meetingSubject" class="form-label">Subject</label>
							<input type="text" class="form-control" th:field="*{subject}">
						</div>
						<div class="col-12">
							<!-- <input type="submit" value="Create" /> -->
							<button type="submit" class="btn btn-success">Create</button>
						</div>
					</form>				
					
				</div>
			</div>

			<br/>
			<br/>
							
			<div class="card">
				<div class="card-header">
					<h5>Meeting list</h5>					
				</div>
				<div class="card-body">
					
					<table style="width:100%" class="table">
						<thead>
							<tr>
								<th>Subject</th>
								<th>Start date</th>
								<th>End date</th>
								<th>Connection link</th>
								<th>Toll number</th>
								<th>Toll free number</th>
								<th>Conference Id</th>
							</tr>
						</thead>
						<tbody>
							<tr th:each="meeting : ${meetings_list}">      
								<td><span th:text="${meeting.subject}">Meeting ID-223456789</span></td>
								<td><span th:text="${meeting.startDateTime}">2021-01-12T17:00:34</span></td>
								<td><span th:text="${meeting.endDateTime}">2021-01-12T17:30:34</span></td>
								<td><a class="btn btn-primary" th:href="${meeting.joinUrl}" role="button">Join URL</a></td>
								<td><span th:text="${meeting.audioConferencing.tollNumber}">+1 630-884-9049</span></td>
								<td><span th:text="${meeting.audioConferencing.tollFreeNumber}"></span></td>
								<td><span th:text="${meeting.audioConferencing.conferenceId}">656798637</span></td>
							</tr>							
						</tbody>						
					</table>	
				</div>
			</div>
				
		</div>
	</body>
</html>
